# Reusable module: ESLint.
# Called by a consumer's pipeline.yml orchestrator:
#   uses: suyash21101/.github/.github/workflows/lint.yml@v1
name: lint (module)

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        required: false
        default: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
